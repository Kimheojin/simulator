spring:
  application:
    name: simulator
  datasource:
    url: jdbc:h2:mem:simulator;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

simulator:
  interval-ms: 5000
  duration: 5m
  offline-ratio: 0.1

control-api:
  base-url: http://control-api:8080
  api-key: simulator-secret
